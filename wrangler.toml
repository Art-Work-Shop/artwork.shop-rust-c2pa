name = "artwork-c2pa-rust-signer"
main = "worker.js"
compatibility_date = "2026-06-20"
workers_dev = true

[observability]
enabled = true
head_sampling_rate = 1

[vars]
C2PA_SIGNER_CREDENTIAL_FORMAT = "c2pa"
C2PA_SIGNER_SELF_TEST_IMAGE_URL = "https://httpbin.org/image/jpeg"

[[containers]]
class_name = "RustSignerContainerV2"
image = "ghcr.io/YOUR_GH_ORG_OR_USERNAME/artwork-c2pa-rust-signer@sha256:REPLACE_WITH_DIGEST"
max_instances = 1
instance_type = { vcpu = 2, memory_mib = 6144 }
idle_timeout_seconds = "30s"

[durable_objects]
bindings = [
  { class_name = "RustSignerContainerV2", name = "RUST_SIGNER" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RustSignerContainerV2"]