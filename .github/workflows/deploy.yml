name: Build and Deploy Rust C2PA Signer

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "rust-http-signer/**"
      - "worker.js"
      - "rust-signer-container.js"
      - "wrangler.toml"
      - ".github/workflows/deploy.yml"

concurrency:
  group: rust-c2pa-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build rust binary
        run: |
          cargo build --manifest-path rust-http-signer/Cargo.toml --release --target x86_64-unknown-linux-gnu --target-dir target
          strip target/x86_64-unknown-linux-gnu/release/artwork-c2pa-rust-http-signer || true

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.toml